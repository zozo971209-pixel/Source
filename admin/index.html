<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>源 - 管理後台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a86c; --gold-light: #e0c48a; --gold-dim: rgba(201,168,108,0.12);
      --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a; --bg4: #222;
      --border: rgba(201,168,108,0.18); --text: #e8e0d0; --text2: #a09070; --text3: #555;
      --success: #4caf50; --error: #f44336; --warn: #ff9800; --info: #2196f3;
      --sidebar-w: 240px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: Georgia, serif; font-size: 14px; }

    /* Login */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: radial-gradient(ellipse at center, #1a1200 0%, #0a0a0a 70%);
    }
    .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 380px; text-align: center; }
    .login-box h1 { font-size: 28px; color: var(--gold); margin-bottom: 8px; }
    .login-box p { color: var(--text2); margin-bottom: 32px; font-size: 13px; }
    .fg { text-align: left; margin-bottom: 16px; }
    .fg label { display: block; color: var(--text2); font-size: 12px; margin-bottom: 6px; }
    .fg input { width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color .2s; }
    .fg input:focus { border-color: var(--gold); }
    .btn-login { width: 100%; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-login:hover { background: var(--gold-light); }
    .login-error { color: var(--error); font-size: 12px; margin-top: 8px; display: none; }

    /* App layout */
    #app { display: none; height: 100vh; }
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 100; overflow-y: auto;
    }
    .sb-logo { padding: 20px; border-bottom: 1px solid var(--border); }
    .sb-logo .title { font-size: 20px; color: var(--gold); font-weight: bold; }
    .sb-logo .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sb-nav { flex: 1; padding: 8px 0; }
    .nav-sec { padding: 8px 16px 4px; font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; color: var(--text2); cursor: pointer; transition: all .15s; font-size: 13px; border-left: 3px solid transparent; }
    .nav-item:hover { color: var(--text); background: var(--gold-dim); }
    .nav-item.active { color: var(--gold); background: var(--gold-dim); border-left-color: var(--gold); }
    .nav-item .ni { font-size: 15px; width: 20px; text-align: center; }
    .sb-foot { padding: 16px 20px; border-top: 1px solid var(--border); }
    .admin-info { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .admin-info strong { color: var(--gold); display: block; font-size: 13px; }
    .btn-out { width: 100%; padding: 8px; background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-out:hover { border-color: var(--error); color: var(--error); }

    /* Main */
    #main { margin-left: var(--sidebar-w); height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .ph { position: sticky; top: 0; background: rgba(10,10,10,.96); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; z-index: 50; flex-shrink: 0; }
    .ph h1 { font-size: 17px; color: var(--gold); }
    .ph .bc { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .ph .bc span { color: var(--text2); cursor: pointer; }
    .ph .bc span:hover { color: var(--gold); }
    .pb { padding: 24px 28px; flex: 1; }

    /* Stats */
    .sg { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 14px; margin-bottom: 22px; }
    .sc { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; text-align: center; }
    .sc .n { font-size: 26px; color: var(--gold); font-weight: bold; }
    .sc .l { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* Card */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
    .ch { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .ch h2 { font-size: 14px; color: var(--text); }
    .cb { padding: 18px 20px; }

    /* Hierarchy list */
    .hl { list-style: none; }
    .hi { display: flex; align-items: center; justify-content: space-between; padding: 11px 20px; border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s; }
    .hi:last-child { border-bottom: none; }
    .hi:hover { background: var(--gold-dim); }
    .hi-l { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; min-width: 0; }
    .hi-ic { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
    .hi-nm { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hi-mt { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .hi-ac { display: flex; gap: 5px; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
    .hi:hover .hi-ac { opacity: 1; }
    .bic { width: 28px; height: 28px; border: 1px solid var(--border); background: transparent; color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .bic:hover { border-color: var(--gold); color: var(--gold); }
    .bic.d:hover { border-color: var(--error); color: var(--error); }
    .empty { padding: 48px 20px; text-align: center; color: var(--text3); }
    .empty .ei { font-size: 40px; margin-bottom: 12px; }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-p { background: var(--gold); color: #000; font-weight: bold; }
    .btn-p:hover { background: var(--gold-light); }
    .btn-s { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-s:hover { border-color: var(--gold); color: var(--gold); }
    .btn-d { background: transparent; color: var(--error); border: 1px solid rgba(244,67,54,.3); }
    .btn-d:hover { background: rgba(244,67,54,.1); }
    .btn-ok { background: rgba(76,175,80,.15); color: var(--success); border: 1px solid rgba(76,175,80,.3); }
    .btn-ok:hover { background: rgba(76,175,80,.25); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .bg { display: flex; gap: 7px; flex-wrap: wrap; }

    /* Modal */
    .mo { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .mo.show { display: flex; }
    .md { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .mh { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .mh h3 { font-size: 16px; color: var(--gold); }
    .mc-btn { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
    .mb { padding: 22px 24px; }
    .mf { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .fr { margin-bottom: 15px; }
    .fr label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .fr input, .fr textarea, .fr select { width: 100%; padding: 9px 13px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
    .fr input:focus, .fr textarea:focus, .fr select:focus { border-color: var(--gold); }
    .fr textarea { min-height: 90px; resize: vertical; }
    .fr select option { background: var(--bg3); }

    /* Badge */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .bp { background: rgba(255,152,0,.15); color: var(--warn); border: 1px solid rgba(255,152,0,.3); }
    .ba { background: rgba(76,175,80,.15); color: var(--success); border: 1px solid rgba(76,175,80,.3); }
    .br { background: rgba(244,67,54,.15); color: var(--error); border: 1px solid rgba(244,67,54,.3); }
    .bi { background: rgba(33,150,243,.15); color: var(--info); border: 1px solid rgba(33,150,243,.3); }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 16px; color: var(--text2); font-weight: normal; font-size: 12px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); }
    td { padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gold-dim); }

    /* Toast */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); padding: 11px 22px; border-radius: 8px; font-size: 13px; z-index: 9999; display: none; white-space: nowrap; }

    /* Filter */
    .fb { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .fb select, .fb input { padding: 7px 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
    .fb select:focus, .fb input:focus { border-color: var(--gold); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>源</h1>
    <p>哲學知識管理後台</p>
    <div class="fg"><label>管理員信箱</label><input type="email" id="le" value="zozo971209@gmail.com"></div>
    <div class="fg"><label>密碼</label><input type="password" id="lp" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">登入後台</button>
    <div class="login-error" id="lerr"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="title">源</div>
      <div class="sub">哲學知識管理後台</div>
    </div>
    <nav class="sb-nav">
      <div class="nav-sec">總覽</div>
      <div class="nav-item active" id="ni-dashboard" onclick="showPanel('dashboard',this)"><span class="ni">📊</span>儀表板</div>
      <div class="nav-sec">哲學內容</div>
      <div class="nav-item" id="ni-era" onclick="showPanel('era',this)"><span class="ni">🌍</span>哲學時代</div>
      <div class="nav-item" id="ni-theory" onclick="showPanel('theory',this)"><span class="ni">💡</span>哲學理論</div>
      <div class="nav-item" id="ni-question" onclick="showPanel('question',this)"><span class="ni">❓</span>哲學問題</div>
      <div class="nav-item" id="ni-thinker" onclick="showPanel('thinker',this)"><span class="ni">✨</span>新思想家</div>
      <div class="nav-sec">社群管理</div>
      <div class="nav-item" id="ni-submissions" onclick="showPanel('submissions',this)"><span class="ni">📝</span>投稿審核<span id="pb" style="display:none;background:var(--error);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:auto;"></span></div>
      <div class="nav-item" id="ni-reports" onclick="showPanel('reports',this)"><span class="ni">🚩</span>意見回報</div>
      <div class="nav-item" id="ni-users" onclick="showPanel('users',this)"><span class="ni">👥</span>用戶管理</div>
    </nav>
    <div class="sb-foot">
      <div class="admin-info"><strong id="aname">管理員</strong>已登入</div>
      <button class="btn-out" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div id="main">
    <div class="ph">
      <div>
        <h1 id="ptitle">儀表板</h1>
        <div class="bc" id="bc"></div>
      </div>
      <div id="pac"></div>
    </div>
    <div class="pb" id="pb2"></div>
  </div>
</div>

<!-- Modal -->
<div class="mo" id="mo">
  <div class="md">
    <div class="mh"><h3 id="mt">新增</h3><button class="mc-btn" onclick="closeModal()">✕</button></div>
    <div class="mb" id="mb"></div>
    <div class="mf">
      <button class="btn btn-s" onclick="closeModal()">取消</button>
      <button class="btn btn-p" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://grccrtpbshfycqicqtyn.supabase.co';
const SB_KEY = 'sb_publishable_CO27p91THj9K7AZZblVpYg_FKqZRjov';
const ADMIN_EMAIL = 'zozo971209@gmail.com';

let sb, currentUser, panel = 'dashboard';
let mType, mEditId, mParentId;

// Hierarchy state
const ES = { lv:'regions', rId:null, rNm:'', eId:null, eNm:'', pId:null, pNm:'', tId:null, tNm:'' };
const TS = { lv:'categories', cId:null, cNm:'', sId:null, sNm:'' };
const QS = { lv:'questions', qId:null, qNm:'', aId:null, aNm:'' };

// ── Init ──
async function init() {
  await new Promise(r => {
    if (window.supabase?.createClient) return r();
    const t = setInterval(() => { if (window.supabase?.createClient) { clearInterval(t); r(); } }, 50);
    setTimeout(() => { clearInterval(t); r(); }, 5000);
  });
  sb = window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true } });
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user?.email === ADMIN_EMAIL) { currentUser = session.user; showApp(); }
}

async function doLogin() {
  const email = document.getElementById('le').value.trim();
  const pw = document.getElementById('lp').value;
  const err = document.getElementById('lerr');
  err.style.display = 'none';
  if (email !== ADMIN_EMAIL) { err.textContent = '非管理員帳號'; err.style.display = 'block'; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { err.textContent = '登入失敗：' + error.message; err.style.display = 'block'; return; }
  currentUser = data.user; showApp();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('aname').textContent = currentUser.email;
  loadDashboard();
}

async function doLogout() { await sb.auth.signOut(); location.reload(); }

// ── Panel ──
function showPanel(name, el) {
  panel = name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const titles = { dashboard:'儀表板', era:'哲學時代', theory:'哲學理論', question:'哲學問題', thinker:'新思想家', submissions:'投稿審核', reports:'意見回報', users:'用戶管理' };
  document.getElementById('ptitle').textContent = titles[name] || name;
  document.getElementById('bc').innerHTML = '';
  document.getElementById('pac').innerHTML = '';
  const map = { dashboard: loadDashboard, era: () => loadEra('regions'), theory: () => loadTheory('categories'), question: () => loadQuestion('questions'), thinker: loadThinkers, submissions: loadSubmissions, reports: loadReports, users: loadUsers };
  if (map[name]) map[name]();
}

// ── Dashboard ──
async function loadDashboard() {
  const body = document.getElementById('pb2');
  body.innerHTML = '<div style="color:var(--text2);padding:20px">載入中...</div>';
  const [rR,eR,pR,tR,qR,sR,rpR,uR] = await Promise.all([
    sb.from('regions').select('id',{count:'exact',head:true}),
    sb.from('eras').select('id',{count:'exact',head:true}),
    sb.from('philosophers').select('id',{count:'exact',head:true}),
    sb.from('theories').select('id',{count:'exact',head:true}),
    sb.from('questions').select('id',{count:'exact',head:true}),
    sb.from('submissions').select('id,status'),
    sb.from('reports').select('id',{count:'exact',head:true}),
    sb.from('users').select('id',{count:'exact',head:true})
  ]);
  const subs = sR.data || [];
  const pend = subs.filter(s=>s.status==='pending').length;
  if (pend > 0) { const b = document.getElementById('pb'); b.textContent = pend; b.style.display = 'inline'; }
  body.innerHTML = `
    <div class="sg">
      <div class="sc"><div class="n">${rR.count||0}</div><div class="l">🌍 地區</div></div>
      <div class="sc"><div class="n">${eR.count||0}</div><div class="l">⏳ 哲學時代</div></div>
      <div class="sc"><div class="n">${pR.count||0}</div><div class="l">🧠 哲學家</div></div>
      <div class="sc"><div class="n">${tR.count||0}</div><div class="l">💡 理論</div></div>
      <div class="sc"><div class="n">${qR.count||0}</div><div class="l">❓ 哲學問題</div></div>
      <div class="sc"><div class="n">${pend}</div><div class="l">📝 待審投稿</div></div>
      <div class="sc"><div class="n">${rpR.count||0}</div><div class="l">🚩 回報</div></div>
      <div class="sc"><div class="n">${uR.count||0}</div><div class="l">👥 用戶</div></div>
    </div>
    <div class="card">
      <div class="ch"><h2>快速操作</h2></div>
      <div class="cb" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;">
        <button class="btn btn-s" onclick="showPanel('era',document.getElementById('ni-era'))">🌍 管理哲學時代</button>
        <button class="btn btn-s" onclick="showPanel('theory',document.getElementById('ni-theory'))">💡 管理哲學理論</button>
        <button class="btn btn-s" onclick="showPanel('question',document.getElementById('ni-question'))">❓ 管理哲學問題</button>
        <button class="btn btn-s" onclick="showPanel('thinker',document.getElementById('ni-thinker'))">✨ 管理新思想家</button>
        <button class="btn btn-s" onclick="showPanel('submissions',document.getElementById('ni-submissions'))">📝 審核投稿${pend>0?` <span style="background:var(--error);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;">${pend}</span>`:''}</button>
        <a href="../" target="_blank" class="btn btn-s" style="text-decoration:none;">🔗 查看前台</a>
      </div>
    </div>`;
}

// ── 哲學時代 層級 ──
async function loadEra(lv, id, nm) {
  ES.lv = lv;
  const body = document.getElementById('pb2');
  const bc = document.getElementById('bc');
  const pac = document.getElementById('pac');

  if (lv === 'regions') {
    bc.innerHTML = '<span style="color:var(--gold)">地區</span>';
    pac.innerHTML = `<button class="btn btn-p" onclick="openModal('region',null,null)">＋ 新增地區</button>`;
    body.innerHTML = '<div style="color:var(--text2);padding:20px">載入中...</div>';
    const { data, error } = await sb.from('regions').select('*').order('name');
    if (error) { body.innerHTML = errHtml(error); return; }
    renderHL(body, data, { icon:'🌍', nk:'name', mk:'description',
      onEdit: id => openModal('region', id, null),
      onDel: id => delItem('regions', id, ()=>loadEra('regions')),
      onClick: (id,nm) => loadEra('eras', id, nm),
      empty: '尚無地區，請點擊右上角新增' });
  }
  else if (lv === 'eras') {
    ES.rId = id; ES.rNm = nm;
    bc.innerHTML = `<span onclick="loadEra('regions')">地區</span> › <span style="color:var(--gold)">${e(nm)}</span> › 時代`;
    pac.innerHTML = `<button class="btn btn-p" onclick="openModal('era',null,'${id}')">＋ 新增時代</button>`;
    body.innerHTML = '<div style="color:var(--text2);padding:20px">載入中...</div>';
    const { data, error } = await sb.from('eras').select('*').eq('region_id', id).order('name');
    if (error) { body.innerHTML = errHtml(error); return; }
    renderHL(body, data, { icon:'⏳', nk:'name', mk:'period',
      onEdit: eid => openModal('era', eid, id),
      onDel: eid => delItem('eras', eid, ()=>loadEra('eras',id,nm)),
      onClick: (eid,enm) => loadEra('philosophers', eid, enm),
      empty: '此地區尚無時代' });
  }
  else if (lv === 'philosophers') {
    ES.eId = id; ES.eNm = nm;
    bc.innerHTML = `<span onclick="loadEra('regions')">地區</span> › <span onclick="loadEra('eras','${ES.rId}','${e(ES.rNm)}')">${e(ES.rNm)}</span> › <span style="color:var(--gold)">${e(nm)}</span> › 哲學家`;
    pac.innerHTML = `<button class="btn btn-p" onclick="openModal('philosopher',null,'${id}')">＋ 新增哲學家</button>`;
    body.innerHTML = '<div style="color:var(--text2);padding:20px">載入中...</div>';
    const { data, error } = await sb.from('philosophers').select('*').eq('era_id', id).order('name');
    if (error) { body.innerHTML = errHtml(error); return; }
    renderHL(body, data, { icon:'🧠', nk:'name', mfn: d => [d.birth_year,d.death_year].filter(Boolean).join(' – '),

async function loadSubmissions() {
  const body = document.getElementById('pb2');
  document.getElementById('bc').innerHTML = '';
  document.getElementById('pac').innerHTML = '';
  body.innerHTML = '<div style="color:var(--text2);padding:20px">載入中...</div>';
  const { data, error } = await sb.from('submissions').select('*').order('created_at',{ascending:false});
  if (error) { body.innerHTML = errHtml(error); return; }
  window._subs = data || [];
  const pend = window._subs.filter(s=>s.status==='pending').length;
  body.innerHTML = `
    <div class="fb">
      <select id="sf" onchange="filterSubs()">
        <option value="all">全部（${window._subs.length}）</option>
        <option value="pending">待審核（${pend}）</option>
        <option value="approved">已通過</option>
        <option value="rejected">已拒絕</option>
      </select>
    </div>
    <div class="card" id="sl">${renderSubsTable(window._subs)}</div>`;
}

function filterSubs() {
  const f = document.getElementById('sf').value;
  const d = f==='all' ? window._subs : window._subs.filter(s=>s.status===f);
  document.getElementById('sl').innerHTML = renderSubsTable(d);
}

function renderSubsTable(items) {
  if (!items.length) return '<div class="empty"><div class="ei">📭</div><p>暫無投稿</p></div>';
  return `<table><thead><tr><th>標題</th><th>分類</th><th>狀態</th><th>時間</th><th>操作</th></tr></thead>
    <tbody>${items.map(s=>`<tr>
      <td>${e(s.title||'')}</td>
      <td>${e(s.category||s.type||'-')}</td>
      <td><span class="badge ${bCls(s.status)}">${sLbl(s.status)}</span></td>
      <td>${fmtD(s.created_at)}</td>
      <td class="bg">
        ${s.status==='pending'?`<button class="btn btn-sm btn-ok" onclick="updSub('${s.id}','approved')">通過</button><button class="btn btn-sm btn-d" onclick="updSub('${s.id}','rejected')">拒絕</button>`:''}
        <button class="btn btn-sm btn-d" onclick="delItem('submissions','${s.id}',loadSubmissions)">刪除</button>
      </td>
    </tr>`).join('')}</tbody></table>`;
}

async function updSub(id, status) {
  const { error } = await sb.from('submissions').update({ status, updated_at: new Date().toISOString() }).eq('id', id);

  toast(status==='approved'?'已通過！':'已拒絕', 'success');

// ── Render Hierarchy List ──
function renderHL(container, data, opts) {
  if (!data || !data.length) {
    container.innerHTML = `<div class="card"><div class="empty"><div class="ei">${opts.icon||'📂'}</div><p>${opts.empty||'尚無資料'}</p></div></div>`;
    return;
  }
  const rows = data.map(item => {
    const nm = e(item[opts.nk] || '');
    const mt = opts.mfn ? e(String(opts.mfn(item)||'')) : e(String(item[opts.mk]||''));
    const mtShort = mt.length > 60 ? mt.substring(0,60) + '...' : mt;
    const clickable = opts.onClick ? `onclick="(${opts.onClick.toString()})('${item.id}','${e(item[opts.nk]||'')}')"` : '';
    return `<li class="hi">
      <div class="hi-l" ${clickable}>
        <div class="hi-ic">${opts.icon||'📄'}</div>
        <div style="min-width:0">
          <div class="hi-nm">${nm}</div>
          ${mtShort ? `<div class="hi-mt">${mtShort}</div>` : ''}
        </div>
      </div>
      <div class="hi-ac">
        ${opts.onClick ? `<button class="bic" title="進入" onclick="(${opts.onClick.toString()})('${item.id}','${e(item[opts.nk]||'')}')">›</button>` : ''}
        <button class="bic" title="編輯" onclick="(${opts.onEdit.toString()})('${item.id}')">✎</button>
        <button class="bic d" title="刪除" onclick="(${opts.onDel.toString()})('${item.id}')">✕</button>
      </div>
    </li>`;
  }).join('');
  container.innerHTML = `<div class="card"><ul class="hl">${rows}</ul></div>`;
}

async function openModal(type, editId, parentId) {
  const cfg = MC[type];
  if (!cfg) return;
  mType = type; mEditId = editId; mParentId = parentId;
  document.getElementById('mt').textContent = (editId ? '編輯' : '新增') + cfg.title;
  let existing = null;
  if (editId) {
    const { data } = await sb.from(cfg.table).select('*').eq('id', editId).single();
    existing = data;
  }
  document.getElementById('mb').innerHTML = cfg.fields.map(f => {
    const val = existing ? (existing[f.id] || '') : '';
    if (f.type === 'textarea') return `<div class="fr"><label>${f.label}</label><textarea id="mf-${f.id}">${e(String(val))}</textarea></div>`;
    if (f.type === 'select') return `<div class="fr"><label>${f.label}</label><select id="mf-${f.id}">${(f.opts||[]).map(o=>`<option value="${o}"${val===o?' selected':''}>${o}</option>`).join('')}</select></div>`;
    return `<div class="fr"><label>${f.label}</label><input type="text" id="mf-${f.id}" value="${e(String(val))}"></div>`;
  }).join('');
  document.getElementById('mo').classList.add('show');
}

async function saveModal() {
  const cfg = MC[mType];
  if (!cfg) return;
  const gv = id => { const el = document.getElementById(`mf-${id}`); return el ? el.value.trim() : ''; };
  const vals = {};
  for (const f of cfg.fields) {
    vals[f.id] = gv(f.id);
    if (f.req && !vals[f.id]) { toast(`請填寫「${f.label.replace(' *','')}」`, 'error'); return; }
  }
  const payload = cfg.payload(vals, mParentId);
  let error;
  if (mEditId) ({ error } = await sb.from(cfg.table).update(payload).eq('id', mEditId));
  else ({ error } = await sb.from(cfg.table).insert(payload));
  if (error) { toast('儲存失敗：' + error.message, 'error'); return; }
  toast('儲存成功！', 'success');
  closeModal();
  reloadView();
}

function reloadView() {
  if (panel === 'era') {
    const lvMap = {
      'regions': [null, null],
      'eras': [ES.rId, ES.rNm],
      'philosophers': [ES.eId, ES.eNm],
      'theories': [ES.pId, ES.pNm],
      'rebuttals': [ES.tId, ES.tNm],
      'rebuttals_t2': [ES.tId, ES.tNm],
      'arguments_p': [ES.pId, ES.pNm],
      'rebuttals_p': [ES.tId, ES.tNm]
    };
    const [lid, lnm] = lvMap[ES.lv] || [null, null];
    loadEra(ES.lv, lid, lnm);
  }
  else if (panel === 'theory') loadTheory(TS.lv, TS.cId||TS.sId, TS.cNm||TS.sNm);
  else if (panel === 'question') loadQuestion(QS.lv, QS.qId||QS.aId, QS.qNm||QS.aNm);
  else if (panel === 'thinker') loadThinkers();
  else if (panel === 'submissions') loadSubmissions();
  else if (panel === 'reports') loadReports();
  else if (panel === 'users') loadUsers();
}

function closeModal() { document.getElementById('mo').classList.remove('show'); }

async function delItem(table, id, reload) {
  if (!confirm('確定要刪除此項目？此操作無法復原。')) return;
  const { error } = await sb.from(table).delete().eq('id', id);
  if (error) { toast('刪除失敗：' + error.message, 'error'); return; }
  toast('已刪除', 'success');
  if (reload) reload();
}

// ── Utils ──
function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtD(s) { if (!s) return '-'; const d = new Date(s); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
function sLbl(s) { return {pending:'待審核',approved:'已通過',rejected:'已拒絕',processing:'處理中',resolved:'已解決'}[s]||s||'-'; }
function bCls(s) { return {pending:'bp',approved:'ba',rejected:'br',processing:'bi',resolved:'ba'}[s]||'bi'; }
function errHtml(err) { return `<div style="color:var(--error);padding:20px">載入失敗：${e(err.message)}</div>`; }
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  const c = {success:['#1a3a1a','#4caf50'],error:['#3a1a1a','#f44336'],info:['#1a2a3a','#2196f3'],warn:['#3a2a0a','#ff9800']}[type]||['#1a2a3a','#2196f3'];
  t.style.cssText = `position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:8px;font-size:13px;z-index:9999;background:${c[0]};border:1px solid ${c[1]};color:${c[1]};display:block;`;
  t.textContent = msg;
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

document.getElementById('mo').addEventListener('click', function(ev) { if (ev.target === this) closeModal(); });
init();
</script>
