<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      try {
        sessionStorage.setItem(
          "spa_redirect",
          window.location.pathname + window.location.search + window.location.hash
        );
      } catch (e) {}
      window.location.replace("/Source/");
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
